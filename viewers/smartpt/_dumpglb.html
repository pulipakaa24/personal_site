<!DOCTYPE html>
<html><head>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
</script>
</head><body>
<pre id="out">Loading…</pre>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
const loader = new GLTFLoader();
loader.load('PTDeviceAssem.glb', (gltf) => {
  const lines = [];
  function walk(node, depth = 0) {
    const indent = '  '.repeat(depth);
    const type = node.isMesh ? 'MESH' : node.isLight ? 'LIGHT' : 'NODE';
    const pos = node.position;
    const rot = node.rotation;
    const scl = node.scale;
    let info = `${indent}${type} "${node.name}"`;
    info += `  pos(${pos.x.toFixed(4)}, ${pos.y.toFixed(4)}, ${pos.z.toFixed(4)})`;
    info += `  rot(${(rot.x*180/Math.PI).toFixed(1)}, ${(rot.y*180/Math.PI).toFixed(1)}, ${(rot.z*180/Math.PI).toFixed(1)})`;
    if (node.isMesh) {
      const geo = node.geometry;
      info += `  verts=${geo.attributes.position.count}`;
    }
    // Check for children count
    info += `  children=${node.children.length}`;
    lines.push(info);
    for (const c of node.children) walk(c, depth + 1);
  }
  walk(gltf.scene);
  
  // Also look for any non-mesh nodes (axes, empties, etc.)
  lines.push('\n--- NON-MESH NODES (potential axes/references) ---');
  gltf.scene.traverse(n => {
    if (!n.isMesh && n.name) {
      const wp = new THREE.Vector3();
      n.getWorldPosition(wp);
      const wd = new THREE.Vector3(0, 0, 1);
      wd.applyQuaternion(n.getWorldQuaternion(new THREE.Quaternion()));
      const wu = new THREE.Vector3(0, 1, 0);
      wu.applyQuaternion(n.getWorldQuaternion(new THREE.Quaternion()));
      lines.push(`  "${n.name}" worldPos(${wp.x.toFixed(3)}, ${wp.y.toFixed(3)}, ${wp.z.toFixed(3)}) worldZ(${wd.x.toFixed(4)}, ${wd.y.toFixed(4)}, ${wd.z.toFixed(4)}) worldY(${wu.x.toFixed(4)}, ${wu.y.toFixed(4)}, ${wu.z.toFixed(4)}) children=${n.children.length}`);
    }
  });
  
  document.getElementById('out').textContent = lines.join('\n');
  console.log(lines.join('\n'));
}, undefined, (err) => {
  document.getElementById('out').textContent = 'ERROR: ' + err.message;
});
</script>
</body></html>
